

services:
  api:
    depends_on:
      - mysql

    build:
      context: ./server
  
    ports: 
      - "7045:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CONNECTION_STRING: ${CONNECTION_STRING}
      AUTH_DOMAIN: ${AUTH_DOMAIN}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE}

  mysql:
    image: mysql:8.0

    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    volumes:
      - mysql-data:/var/lib/mysql
      - ./server/dbSetup.sql:/docker-entrypoint-initdb.d/dbSetup.sql

  vite:
    depends_on:
      - api

    build: 
      context: ./client
    
    ports:
      - "5173:5173"
    
    volumes:
      - ./client:/app
      - /app/node_modules



volumes: 
  mysql-data: